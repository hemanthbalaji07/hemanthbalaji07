<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 350 280" width="350" height="280">
  <defs>
    <!-- Background Glassmorphism -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f1420" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#05070f" stop-opacity="0.95" />
    </linearGradient>
    
    <!-- Neon Gradients -->
    <linearGradient id="neon-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f0ff" />
      <stop offset="50%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>

    <linearGradient id="chip-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#00f0ff" />
    </linearGradient>

    <!-- Glowing effects -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <style>
    /* Card Frame */
    .window {
      fill: url(#bg-grad);
      stroke: url(#neon-glow);
      stroke-width: 1.5;
      rx: 16px;
    }
    
    .window-header {
      fill: #090c15;
      rx: 16px;
    }

    /* Rotation Animations */
    @keyframes spinCW {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes spinCCW {
      from { transform: rotate(0deg); }
      to { transform: rotate(-360deg); }
    }
    .rotate-cw {
      animation: spinCW 15s linear infinite;
      transform-origin: 175px 145px;
    }
    .rotate-ccw {
      animation: spinCCW 20s linear infinite;
      transform-origin: 175px 145px;
    }

    /* Core Pulsing Animation */
    @keyframes corePulse {
      0%, 100% { transform: scale(1); filter: drop-shadow(0 0 4px rgba(0, 240, 255, 0.4)); }
      50% { transform: scale(1.08); filter: drop-shadow(0 0 12px rgba(0, 240, 255, 0.8)); }
    }
    .core-module {
      animation: corePulse 3s infinite ease-in-out;
      transform-origin: 175px 145px;
    }

    /* Synapse Data Flow Animation */
    @keyframes flow {
      to {
        stroke-dashoffset: -40;
      }
    }
    .synapse-path {
      stroke: #1b233a;
      stroke-width: 1.5;
      fill: none;
    }
    .active-synapse {
      stroke-width: 1.5;
      stroke-dasharray: 6 14;
      animation: flow 2s linear infinite;
      fill: none;
    }

    /* Neon Colors */
    .cyan-glow { stroke: #00f0ff; }
    .purple-glow { stroke: #a855f7; }
    .pink-glow { stroke: #ec4899; }
    
    /* Nodes Pulsing */
    @keyframes nodeBlink {
      0%, 100% { opacity: 0.5; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.3); }
    }
    .node {
      fill: #ffffff;
      animation: nodeBlink 2s infinite ease-in-out;
    }
    .n-cyan { fill: #00f0ff; filter: drop-shadow(0 0 3px #00f0ff); }
    .n-purple { fill: #a855f7; filter: drop-shadow(0 0 3px #a855f7); }
    .n-pink { fill: #ec4899; filter: drop-shadow(0 0 3px #ec4899); }

    /* Floating particles */
    @keyframes floatParticle {
      0%, 100% { transform: translateY(0); opacity: 0.4; }
      50% { transform: translateY(-8px); opacity: 0.9; }
    }
    .floating-particles circle {
      animation: floatParticle 4s infinite ease-in-out;
    }

    /* Waveform Animation */
    @keyframes wave {
      0% { stroke-dashoffset: 0; }
      100% { stroke-dashoffset: -100; }
    }
    .signal-wave {
      stroke: url(#neon-glow);
      stroke-width: 1.5;
      stroke-dasharray: 8 6;
      animation: wave 4s linear infinite;
      fill: none;
      opacity: 0.7;
    }
  </style>

  <!-- Glassmorphic Canvas -->
  <rect class="window" width="350" height="280" />
  
  <!-- Header Bar -->
  <path class="window-header" d="M0,16 C0,7.16 7.16,0 16,0 L334,0 C342.84,0 350,7.16 350,16 L350,28 L0,28 Z" />
  <circle cx="20" cy="14" r="4.5" fill="#ff5f56" />
  <circle cx="34" cy="14" r="4.5" fill="#ffbd2e" />
  <circle cx="48" cy="14" r="4.5" fill="#27c93f" />
  <text x="75" y="17" fill="#8b949e" font-family="'Fira Code', monospace" font-size="9" font-weight="bold">AI_NEURO_CORE // ONLINE</text>

  <!-- Cybernetic Grid Background -->
  <path d="M 0,80 L 350,80 M 0,140 L 350,140 M 0,200 L 350,200 M 70,28 L 70,280 M 140,28 L 140,280 M 210,28 L 210,280 M 280,28 L 280,280" stroke="#101524" stroke-width="0.8" />

  <!-- Background Signal Waveform (Bottom) -->
  <path class="signal-wave" d="M 15,245 C 50,230 80,260 120,245 C 160,230 190,260 230,245 C 270,230 300,260 335,245" />

  <!-- Synapse Lines / Circuit Paths -->
  <g>
    <!-- Background connectors -->
    <path class="synapse-path" d="M 175,145 L 80,75 L 50,135 Z" />
    <path class="synapse-path" d="M 175,145 L 120,215 L 60,180 Z" />
    <path class="synapse-path" d="M 175,145 L 270,75 L 300,135 Z" />
    <path class="synapse-path" d="M 175,145 L 230,215 L 290,180 Z" />
    
    <!-- Active Animated Synapses (Data Packets) -->
    <path class="active-synapse cyan-glow" d="M 175,145 L 80,75 L 50,135" />
    <path class="active-synapse purple-glow" d="M 175,145 L 120,215 L 60,180" />
    <path class="active-synapse pink-glow" d="M 175,145 L 270,75 L 300,135" />
    <path class="active-synapse cyan-glow" d="M 175,145 L 230,215 L 290,180" />
    
    <path class="active-synapse purple-glow" d="M 50,135 L 175,145 L 300,135" />
  </g>

  <!-- Concentric HUD Orbit Rings (Rotational) -->
  <g class="rotate-cw">
    <circle cx="175" cy="145" r="72" fill="none" stroke="#a855f7" stroke-width="0.8" stroke-dasharray="10 30 5 15" opacity="0.4" />
    <circle cx="175" cy="145" r="58" fill="none" stroke="#00f0ff" stroke-width="1.2" stroke-dasharray="40 10 5 5" opacity="0.6" />
  </g>
  <g class="rotate-ccw">
    <circle cx="175" cy="145" r="65" fill="none" stroke="#ec4899" stroke-width="1" stroke-dasharray="15 15" opacity="0.5" />
    <circle cx="175" cy="145" r="48" fill="none" stroke="#ffffff" stroke-width="0.8" stroke-dasharray="4 8" opacity="0.3" />
  </g>

  <!-- Outer Network Nodes (Positioned in a star/lattice configuration) -->
  <g>
    <!-- Top Left Cluster -->
    <circle cx="80" cy="75" r="5" class="node n-cyan" />
    <circle cx="50" cy="135" r="6" class="node n-pink" />
    <circle cx="35" cy="90" r="3.5" class="node n-purple" />
    
    <!-- Bottom Left Cluster -->
    <circle cx="120" cy="215" r="6.5" class="node n-purple" />
    <circle cx="60" cy="180" r="4.5" class="node n-cyan" />
    
    <!-- Top Right Cluster -->
    <circle cx="270" cy="75" r="5.5" class="node n-pink" />
    <circle cx="300" cy="135" r="5" class="node n-cyan" />
    <circle cx="315" cy="95" r="3" class="node n-purple" />

    <!-- Bottom Right Cluster -->
    <circle cx="230" cy="215" r="4.5" class="node n-cyan" />
    <circle cx="290" cy="180" r="6" class="node n-pink" />
  </g>

  <!-- Central AI Neuro-Core Processor (Pulsing hardware chip) -->
  <g class="core-module">
    <!-- Outer Glow ring -->
    <circle cx="175" cy="145" r="32" fill="none" stroke="#00f0ff" stroke-width="1.5" opacity="0.4" />
    
    <!-- Central Chip base -->
    <rect x="153" y="123" width="44" height="44" rx="8" fill="url(#chip-grad)" stroke="#ffffff" stroke-width="1.5" filter="url(#glow)" />
    <rect x="157" y="127" width="36" height="36" rx="6" fill="#090c15" />
    
    <!-- Chip Details / Circuit Pins -->
    <line x1="160" y1="120" x2="160" y2="127" stroke="#ffffff" stroke-width="1.5" />
    <line x1="170" y1="120" x2="170" y2="127" stroke="#ffffff" stroke-width="1.5" />
    <line x1="180" y1="120" x2="180" y2="127" stroke="#ffffff" stroke-width="1.5" />
    <line x1="190" y1="120" x2="190" y2="127" stroke="#ffffff" stroke-width="1.5" />

    <line x1="160" y1="163" x2="160" y2="170" stroke="#ffffff" stroke-width="1.5" />
    <line x1="170" y1="163" x2="170" y2="170" stroke="#ffffff" stroke-width="1.5" />
    <line x1="180" y1="163" x2="180" y2="170" stroke="#ffffff" stroke-width="1.5" />
    <line x1="190" y1="163" x2="190" y2="170" stroke="#ffffff" stroke-width="1.5" />

    <line x1="120" y1="160" x2="127" y2="160" stroke="#ffffff" stroke-width="1.5" />
    <line x1="120" y1="170" x2="127" y2="170" stroke="#ffffff" stroke-width="1.5" />
    <line x1="120" y1="180" x2="127" y2="180" stroke="#ffffff" stroke-width="1.5" />
    <line x1="120" y1="190" x2="127" y2="190" stroke="#ffffff" stroke-width="1.5" />

    <!-- CPU Center Core symbol (Styling neural nodes inside chip) -->
    <circle cx="175" cy="145" r="7" fill="none" stroke="#00f0ff" stroke-width="1" />
    <circle cx="175" cy="145" r="3" fill="#ffffff" />
  </g>

  <!-- Ambient Floating Data Particles -->
  <g class="floating-particles">
    <circle cx="110" cy="100" r="1.5" fill="#00f0ff" style="animation-delay: 0s;" />
    <circle cx="230" cy="100" r="2" fill="#ec4899" style="animation-delay: 1.5s;" />
    <circle cx="150" cy="200" r="1.5" fill="#a855f7" style="animation-delay: 0.8s;" />
    <circle cx="200" cy="90" r="1" fill="#ffffff" style="animation-delay: 2.2s;" />
  </g>
</svg>
