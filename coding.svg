<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 350 280" width="350" height="280">
  <defs>
    <!-- Premium Dark Glassmorphic Gradients -->
    <linearGradient id="glass-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f1420" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#05070f" stop-opacity="0.95" />
    </linearGradient>
    
    <linearGradient id="neon-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f0ff" />
      <stop offset="50%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>

    <!-- Orb Gradients -->
    <radialGradient id="core-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00f0ff" stop-opacity="1" />
      <stop offset="30%" stop-color="#00f0ff" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0" />
    </radialGradient>
  </defs>

  <style>
    /* Main Window */
    .window {
      fill: url(#glass-grad);
      stroke: url(#neon-glow);
      stroke-width: 1.5;
      rx: 16px;
      filter: drop-shadow(0 8px 24px rgba(0, 0, 0, 0.5));
    }
    
    .window-header {
      fill: #090c15;
      rx: 16px;
    }

    /* Console Fonts */
    .terminal-text {
      font-family: 'Fira Code', 'Segoe UI Mono', monospace;
      font-size: 10px;
      fill: #e2e8f0;
    }
    
    .system { fill: #00f0ff; font-weight: bold; }
    .success { fill: #10b981; }
    .accent { fill: #a855f7; }
    .muted { fill: #4b5563; }
    .highlight { fill: #f43f5e; font-weight: bold; }

    /* Animations */
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
    .cursor {
      animation: blink 1s infinite;
      fill: #00f0ff;
    }

    /* Hologram Rotation (3D simulation) */
    @keyframes rotateCW {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes rotateCCW {
      from { transform: rotate(0deg); }
      to { transform: rotate(-360deg); }
    }
    .orbit-1 {
      animation: rotateCW 12s linear infinite;
      transform-origin: 270px 145px;
    }
    .orbit-2 {
      animation: rotateCCW 8s linear infinite;
      transform-origin: 270px 145px;
    }
    
    /* Breathing / Pulsing Core */
    @keyframes pulseCore {
      0%, 100% { transform: scale(1); opacity: 0.6; }
      50% { transform: scale(1.15); opacity: 0.95; }
    }
    .core {
      animation: pulseCore 3s infinite ease-in-out;
      transform-origin: 270px 145px;
    }

    /* Cyber Status Light */
    @keyframes statusPulse {
      0%, 100% { fill: #10b981; filter: drop-shadow(0 0 2px #10b981); }
      50% { fill: #059669; filter: drop-shadow(0 0 6px #10b981); }
    }
    .status-dot {
      animation: statusPulse 2s infinite;
    }

    /* Terminal Message Reveal */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .msg-1 { animation: fadeInUp 0.4s ease-out 0.2s both; }
    .msg-2 { animation: fadeInUp 0.4s ease-out 0.8s both; }
    .msg-3 { animation: fadeInUp 0.4s ease-out 1.4s both; }
    .msg-4 { animation: fadeInUp 0.4s ease-out 2.0s both; }
    .msg-5 { animation: fadeInUp 0.4s ease-out 2.6s both; }
    .msg-6 { animation: fadeInUp 0.4s ease-out 3.2s both; }
    .msg-7 { animation: fadeInUp 0.4s ease-out 3.8s both; }
    .msg-8 { animation: fadeInUp 0.4s ease-out 4.4s both; }

    /* Code stream background falling elements */
    @keyframes matrixStream {
      0% { stroke-dashoffset: 40; }
      100% { stroke-dashoffset: 0; }
    }
    .stream-line {
      stroke: #161b2c;
      stroke-width: 1;
      stroke-dasharray: 10 30;
      animation: matrixStream 3s linear infinite;
    }
    
    @keyframes floatParticle {
      0%, 100% { transform: translateY(0) scale(1); opacity: 0.3; }
      50% { transform: translateY(-10px) scale(1.2); opacity: 0.8; }
    }
    .particle-1 { animation: floatParticle 4s infinite ease-in-out; transform-origin: 250px 100px; }
    .particle-2 { animation: floatParticle 5s infinite ease-in-out 1s; transform-origin: 290px 180px; }
  </style>

  <!-- Glassmorphic Window Outer -->
  <rect class="window" width="350" height="280" />
  
  <!-- Window Header Bar -->
  <path class="window-header" d="M0,16 C0,7.16 7.16,0 16,0 L334,0 C342.84,0 350,7.16 350,16 L350,28 L0,28 Z" />
  
  <!-- Header Control Dots -->
  <circle cx="20" cy="14" r="4.5" fill="#ff5f56" />
  <circle cx="34" cy="14" r="4.5" fill="#ffbd2e" />
  <circle cx="48" cy="14" r="4.5" fill="#27c93f" />
  
  <!-- Header Title / Status -->
  <text x="75" y="17" fill="#8b949e" font-family="'Fira Code', monospace" font-size="9" font-weight="bold">AGENT_WORKSPACE // ACTIVE</text>
  <circle class="status-dot" cx="240" cy="14" r="3.5" />

  <!-- Background Grid & Matrix Lines -->
  <line x1="180" y1="28" x2="180" y2="280" stroke="#161b2c" stroke-dasharray="2 2" />
  <line class="stream-line" x1="220" y1="30" x2="220" y2="270" />
  <line class="stream-line" x1="310" y1="30" x2="310" y2="270" />

  <!-- LEFT SIDE: AI Diagnostics Terminal -->
  <g transform="translate(15, 45)" class="terminal-text">
    <g class="msg-1">
      <text x="0" y="15" class="system">&gt; init_agent_nexus()</text>
    </g>
    <g class="msg-2">
      <text x="0" y="30" class="muted">Connecting to host...</text>
      <text x="120" y="30" class="success">[CONNECTED]</text>
    </g>
    <g class="msg-3">
      <text x="0" y="45" class="accent">&gt;&gt; neural_layers = [64, 32, 16, 2]</text>
    </g>
    <g class="msg-4">
      <text x="0" y="60" class="muted">Initializing backward pass...</text>
    </g>
    <g class="msg-5">
      <text x="0" y="75" class="success">&gt;&gt; optimization: AdamW</text>
    </g>
    <g class="msg-6">
      <text x="0" y="95" class="accent">&gt; training_loop.start()</text>
    </g>
    <g class="msg-7">
      <text x="0" y="115" class="system">Epoch 042/100 // Active</text>
    </g>
    <g class="msg-8">
      <text x="0" y="135" class="muted">└── loss: </text>
      <text x="55" y="135" class="highlight">0.0108</text>
      <text x="0" y="150" class="muted">└── acc:  </text>
      <text x="55" y="150" class="success">99.92%</text>
    </g>

    <!-- Terminal Prompt Line -->
    <text x="0" y="180" class="system">&gt;</text>
    <rect class="cursor" x="10" y="171" width="5" height="11" />
  </g>

  <!-- RIGHT SIDE: The Holographic Neural Fusion Core -->
  <g>
    <!-- Glow behind the hologram -->
    <circle class="core" cx="270" cy="145" r="35" fill="url(#core-glow)" />

    <!-- Concentric Orbit Ring 1 (Yaw-angled) -->
    <g class="orbit-1">
      <ellipse cx="270" cy="145" rx="45" ry="18" fill="none" stroke="#00f0ff" stroke-width="1" stroke-dasharray="6 4" opacity="0.6" transform="rotate(-15 270 145)" />
      <!-- Orbit Nodes -->
      <circle cx="225" cy="145" r="3.5" fill="#00f0ff" />
      <circle cx="315" cy="145" r="3.5" fill="#00f0ff" />
      <circle cx="270" cy="127" r="2.5" fill="#a855f7" />
    </g>

    <!-- Concentric Orbit Ring 2 (Pitch-angled) -->
    <g class="orbit-2">
      <ellipse cx="270" cy="145" rx="40" ry="15" fill="none" stroke="#ec4899" stroke-width="1.2" stroke-dasharray="3 3" opacity="0.5" transform="rotate(45 270 145)" />
      <!-- Orbit Nodes -->
      <circle cx="270" cy="130" r="3" fill="#ec4899" />
      <circle cx="270" cy="160" r="4" fill="#a855f7" />
    </g>

    <!-- Orbit Ring 3 (Inner Fast Orbit) -->
    <g class="orbit-1">
      <circle cx="270" cy="145" r="25" fill="none" stroke="#a855f7" stroke-width="0.8" opacity="0.4" />
      <circle cx="250" cy="130" r="2" fill="#ffffff" />
    </g>

    <!-- Central Floating Neural Orb -->
    <circle cx="270" cy="145" r="10" fill="#00f0ff" filter="drop-shadow(0 0 8px #00f0ff)" />
    <circle cx="270" cy="145" r="4" fill="#ffffff" />

    <!-- Glowing Tech Particle Dots Floating in Space -->
    <g class="particle-1">
      <circle cx="245" cy="95" r="1.5" fill="#00f0ff" />
      <line x1="245" y1="95" x2="235" y2="90" stroke="#00f0ff" stroke-width="0.5" opacity="0.5" />
    </g>
    <g class="particle-2">
      <circle cx="300" cy="195" r="2.0" fill="#ec4899" />
      <line x1="300" y1="195" x2="310" y2="200" stroke="#ec4899" stroke-width="0.5" opacity="0.5" />
    </g>
    <circle cx="290" cy="90" r="1" fill="#ffffff" opacity="0.8" />
    <circle cx="230" cy="180" r="1" fill="#ffffff" opacity="0.5" />

    <!-- Mathematical Text Labels -->
    <text x="250" y="78" fill="#4b5563" font-family="'Fira Code', monospace" font-size="7">loss_func</text>
    <text x="278" y="222" fill="#4b5563" font-family="'Fira Code', monospace" font-size="7">backprop</text>
  </g>

  <!-- Bottom Visual Waveform / Tech Border -->
  <path d="M 12 268 L 70 268 L 80 274 L 120 274 L 130 268 L 338 268" fill="none" stroke="#161b2c" stroke-width="1.5" />
  <path d="M 72 268 L 78 274 L 122 274 L 128 268" fill="none" stroke="url(#neon-glow)" stroke-width="1.5" />
</svg>
