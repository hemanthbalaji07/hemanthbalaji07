<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 350 280" width="350" height="280">
  <defs>
    <!-- Dark Glassmorphic Gradient -->
    <linearGradient id="glass-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f1422" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#050711" stop-opacity="0.95" />
    </linearGradient>

    <!-- Neon Gradients -->
    <linearGradient id="neon-accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f0ff" />
      <stop offset="100%" stop-color="#ff007f" />
    </linearGradient>
    
    <linearGradient id="visor-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff007f" />
      <stop offset="100%" stop-color="#7000ff" />
    </linearGradient>

    <linearGradient id="steam-grad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#8b949e" stop-opacity="0" />
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </linearGradient>
  </defs>

  <style>
    /* Card Frame */
    .window {
      fill: url(#glass-bg);
      stroke: url(#neon-accent);
      stroke-width: 1.5;
      rx: 16px;
    }
    
    .window-header {
      fill: #090c15;
      rx: 16px;
    }

    /* Keyframe Animations */
    @keyframes earWiggle {
      0%, 90%, 100% { transform: rotate(0deg); }
      93% { transform: rotate(-5deg); }
      96% { transform: rotate(5deg); }
    }
    .left-ear {
      transform-origin: 215px 105px;
      animation: earWiggle 5s infinite;
    }
    .right-ear {
      transform-origin: 265px 105px;
      animation: earWiggle 5s infinite 0.3s;
    }

    /* Visor Scan Line */
    @keyframes scan {
      0% { transform: translateY(-4px); }
      50% { transform: translateY(8px); }
      100% { transform: translateY(-4px); }
    }
    .scan-line {
      animation: scan 2s linear infinite;
    }

    /* Typing Paws */
    @keyframes typeLeft {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-4px); }
    }
    @keyframes typeRight {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
    .paw-l {
      animation: typeLeft 0.25s infinite ease-in-out;
      transform-origin: 190px 210px;
    }
    .paw-r {
      animation: typeRight 0.22s infinite ease-in-out 0.05s;
      transform-origin: 290px 210px;
    }

    /* Blinking Keyboard Keys */
    @keyframes keyBlink {
      0%, 100% { fill: #1b233a; }
      50% { fill: #00f0ff; }
    }
    .key-1 { animation: keyBlink 0.6s infinite 0.1s; }
    .key-2 { animation: keyBlink 0.8s infinite 0.3s; }
    .key-3 { animation: keyBlink 0.5s infinite 0.2s; }
    .key-4 { animation: keyBlink 0.7s infinite 0.4s; }

    /* Rising Steam */
    @keyframes steam {
      0% { stroke-dashoffset: 0; opacity: 0.1; }
      50% { opacity: 0.7; }
      100% { stroke-dashoffset: -30; opacity: 0; }
    }
    .steam-line {
      stroke: url(#steam-grad);
      stroke-width: 2;
      stroke-linecap: round;
      fill: none;
      stroke-dasharray: 15 15;
      animation: steam 3s linear infinite;
    }

    /* Speech Bubble Bobbing and Reveal */
    @keyframes bubbleBob {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-4px); }
    }
    .speech-bubble {
      animation: bubbleBob 3s infinite ease-in-out;
    }

    /* RGB Headphones pulse */
    @keyframes rgbGlow {
      0%, 100% { stroke: #00f0ff; filter: drop-shadow(0 0 2px #00f0ff); }
      50% { stroke: #ff007f; filter: drop-shadow(0 0 6px #ff007f); }
    }
    .headphone-ring {
      animation: rgbGlow 3s infinite ease-in-out;
      stroke-width: 2;
      fill: none;
    }
  </style>

  <!-- Frame -->
  <rect class="window" width="350" height="280" />
  
  <!-- Header -->
  <path class="window-header" d="M0,16 C0,7.16 7.16,0 16,0 L334,0 C342.84,0 350,7.16 350,16 L350,28 L0,28 Z" />
  <circle cx="20" cy="14" r="4.5" fill="#ff5f56" />
  <circle cx="34" cy="14" r="4.5" fill="#ffbd2e" />
  <circle cx="48" cy="14" r="4.5" fill="#27c93f" />
  <text x="75" y="17" fill="#8b949e" font-family="'Fira Code', monospace" font-size="9" font-weight="bold">MEOW_TERMINAL // USER_CAT</text>

  <!-- Left Side: Coffee Station -->
  <g transform="translate(35, 120)">
    <!-- Animated Steam -->
    <path class="steam-line" d="M 15,-10 C 10,-20 20,-30 15,-40" style="animation-delay: 0s;" />
    <path class="steam-line" d="M 22,-10 C 18,-20 28,-30 22,-40" style="animation-delay: 1.5s;" />

    <!-- Coffee Mug -->
    <rect x="5" y="0" width="24" height="26" rx="4" fill="#ff007f" />
    <!-- Mug Handle -->
    <path d="M 29,6 C 34,6 34,20 29,20" fill="none" stroke="#ff007f" stroke-width="3" stroke-linecap="round" />
    <!-- Steam Plate / Coaster -->
    <line x1="0" y1="26" x2="34" y2="26" stroke="#1b233a" stroke-width="2" stroke-linecap="round" />
    
    <!-- Heart / Pixel decal on Mug -->
    <path d="M 17,9 L 15,11 L 13,9 L 11,11 L 15,15 L 19,11 Z" fill="#ffffff" />
  </g>

  <!-- Left/Center Side: Neon Keyboard -->
  <g transform="translate(100, 160)">
    <!-- Keyboard Base -->
    <rect x="0" y="0" width="105" height="40" rx="6" fill="#0d1117" stroke="#1b233a" stroke-width="1.5" />
    
    <!-- Keyboard Keys (illuminated) -->
    <!-- Row 1 -->
    <rect x="6" y="6" width="10" height="8" rx="1.5" class="key-1" fill="#1b233a" />
    <rect x="20" y="6" width="10" height="8" rx="1.5" class="key-2" fill="#1b233a" />
    <rect x="34" y="6" width="10" height="8" rx="1.5" class="key-3" fill="#1b233a" />
    <rect x="48" y="6" width="10" height="8" rx="1.5" class="key-4" fill="#1b233a" />
    <rect x="62" y="6" width="10" height="8" rx="1.5" class="key-1" fill="#1b233a" />
    <rect x="76" y="6" width="10" height="8" rx="1.5" class="key-2" fill="#1b233a" />
    <rect x="90" y="6" width="9" height="8" rx="1.5" fill="#ff007f" />

    <!-- Row 2 -->
    <rect x="6" y="16" width="12" height="8" rx="1.5" fill="#00f0ff" />
    <rect x="22" y="16" width="10" height="8" rx="1.5" class="key-3" fill="#1b233a" />
    <rect x="36" y="16" width="10" height="8" rx="1.5" class="key-4" fill="#1b233a" />
    <rect x="50" y="16" width="10" height="8" rx="1.5" class="key-1" fill="#1b233a" />
    <rect x="64" y="16" width="10" height="8" rx="1.5" class="key-2" fill="#1b233a" />
    <rect x="78" y="16" width="21" height="8" rx="1.5" fill="#7000ff" />

    <!-- Row 3 (Spacebar row) -->
    <rect x="6" y="26" width="16" height="8" rx="1.5" fill="#1b233a" />
    <rect x="26" y="26" width="53" height="8" rx="1.5" class="key-4" fill="#1b233a" />
    <rect x="83" y="26" width="16" height="8" rx="1.5" fill="#1b233a" />
  </g>

  <!-- Right Side: Cyberpunk Hacker Cat -->
  <g>
    <!-- Cat Ears -->
    <path class="left-ear" d="M 210,120 L 205,85 L 228,100 Z" fill="#0d1117" stroke="#1b233a" stroke-width="1.5" />
    <path class="left-ear" d="M 212,115 L 209,92 L 224,102 Z" fill="#ff007f" opacity="0.8" />

    <path class="right-ear" d="M 270,120 L 275,85 L 252,100 Z" fill="#0d1117" stroke="#1b233a" stroke-width="1.5" />
    <path class="right-ear" d="M 268,115 L 271,92 L 256,102 Z" fill="#ff007f" opacity="0.8" />

    <!-- Cat Head Base -->
    <circle cx="240" cy="135" r="30" fill="#0d1117" stroke="#1b233a" stroke-width="2" />
    
    <!-- Cheek Fluffs -->
    <path d="M 210,135 L 198,140 L 211,146 Z" fill="#0d1117" />
    <path d="M 270,135 L 282,140 L 269,146 Z" fill="#0d1117" />

    <!-- Visor (Glasses) -->
    <rect x="212" y="125" width="56" height="15" rx="6" fill="url(#visor-grad)" stroke="#ffffff" stroke-width="1" />
    <path d="M 212,130 C 230,127 250,127 268,130" fill="none" stroke="#00f0ff" stroke-width="1.5" />
    
    <!-- Visor Scan Line animation -->
    <g class="scan-line">
      <line x1="214" y1="128" x2="266" y2="128" stroke="#00f0ff" stroke-width="1.5" opacity="0.8" />
    </g>

    <!-- Cat Nose and Whiskers -->
    <path d="M 240,147 L 238,145 L 242,145 Z" fill="#ff007f" />
    <!-- Whiskers -->
    <line x1="205" y1="150" x2="190" y2="152" stroke="#1b233a" stroke-width="1" />
    <line x1="205" y1="154" x2="188" y2="159" stroke="#1b233a" stroke-width="1" />
    <line x1="275" y1="150" x2="290" y2="152" stroke="#1b233a" stroke-width="1" />
    <line x1="275" y1="154" x2="292" y2="159" stroke="#1b233a" stroke-width="1" />

    <!-- Cyber Headphones -->
    <!-- Headband -->
    <path d="M 207,118 C 207,95 273,95 273,118" fill="none" stroke="#0d1117" stroke-width="4.5" />
    
    <!-- Left Cup -->
    <rect x="199" y="118" width="10" height="25" rx="5" fill="#090c15" stroke="#1b233a" stroke-width="1.5" />
    <ellipse cx="204" cy="130" rx="3" ry="8" class="headphone-ring" />
    
    <!-- Right Cup -->
    <rect x="271" y="118" width="10" height="25" rx="5" fill="#090c15" stroke="#1b233a" stroke-width="1.5" />
    <ellipse cx="276" cy="130" rx="3" ry="8" class="headphone-ring" />

    <!-- Animated Typing Paws -->
    <g class="paw-l">
      <!-- Arm -->
      <path d="M 195,190 L 195,175 C 195,170 188,165 185,165 C 182,165 175,170 175,175 L 175,190 Z" fill="#0d1117" stroke="#1b233a" stroke-width="1" />
      <!-- Paw Pad -->
      <circle cx="185" cy="168" r="3.5" fill="#ff007f" />
    </g>
    <g class="paw-r">
      <!-- Arm -->
      <path d="M 285,190 L 285,175 C 285,170 292,165 295,165 C 298,165 305,170 305,175 L 305,190 Z" fill="#0d1117" stroke="#1b233a" stroke-width="1" />
      <!-- Paw Pad -->
      <circle cx="295" cy="168" r="3.5" fill="#ff007f" />
    </g>
  </g>

  <!-- Bobbing Speech Bubble: git commit -m "meow" -->
  <g class="speech-bubble" transform="translate(60, 50)">
    <!-- Bubble frame -->
    <rect x="0" y="0" width="125" height="28" rx="8" fill="#0d1117" stroke="#00f0ff" stroke-width="1.5" />
    <!-- Tail pointing to cat -->
    <path d="M 115,28 L 125,35 L 122,28 Z" fill="#0d1117" stroke="#00f0ff" stroke-width="1.5" />
    <!-- Cover up tail outline inside -->
    <path d="M 113,27 L 123,27 L 120,29 Z" fill="#0d1117" />
    <!-- Text -->
    <text x="12" y="17" fill="#00f0ff" font-family="'Fira Code', monospace" font-size="9" font-weight="bold">sudo git push --force</text>
  </g>

  <!-- Accent sparks / Coding brackets floating -->
  <g>
    <!-- Cyan code brace -->
    <text x="50" y="85" fill="#00f0ff" opacity="0.4" font-family="monospace" font-size="16">{</text>
    <!-- Pink code brace -->
    <text x="300" y="225" fill="#ff007f" opacity="0.4" font-family="monospace" font-size="16">}</text>
    
    <!-- Neon green cross star -->
    <path d="M 310,65 L 314,65 M 312,63 L 312,67" stroke="#27c93f" stroke-width="1.5" opacity="0.6" />
    <!-- Cyan cross star -->
    <path d="M 40,210 L 44,210 M 42,208 L 42,212" stroke="#00f0ff" stroke-width="1.5" opacity="0.6" />
  </g>
</svg>
