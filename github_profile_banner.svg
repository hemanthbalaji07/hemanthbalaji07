<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a051b" />
      <stop offset="50%" stop-color="#0e0c24" />
      <stop offset="100%" stop-color="#05020c" />
    </linearGradient>

    <!-- Text Gradient -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d946ef" /> <!-- Fuchsia -->
      <stop offset="50%" stop-color="#a855f7" /> <!-- Purple -->
      <stop offset="100%" stop-color="#06b6d4" /> <!-- Cyan -->
    </linearGradient>

    <!-- Glowing Effects -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="glow-heavy" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="blur1" />
      <feGaussianBlur stdDeviation="4" result="blur2" />
      <feMerge>
        <feMergeNode in="blur1" />
        <feMergeNode in="blur2" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    /* CSS Styles & Keyframe Animations */
    .bg {
      fill: url(#bgGrad);
    }

    /* 3D Moving Perspective Grid */
    .grid-lines {
      stroke: #3b0764;
      stroke-width: 1;
      opacity: 0.15;
      animation: gridShift 8s linear infinite;
    }

    @keyframes gridShift {
      0% {
        transform: translateY(0px);
      }
      100% {
        transform: translateY(40px);
      }
    }

    /* Neural Network Animations */
    .node {
      fill: #06b6d4;
      filter: url(#glow);
      animation: pulseNode 3s ease-in-out infinite alternate;
    }
    
    .node-violet {
      fill: #d946ef;
      filter: url(#glow);
      animation: pulseNode 4s ease-in-out infinite alternate;
      animation-delay: 1s;
    }

    .connection {
      stroke: #a855f7;
      stroke-width: 0.8;
      stroke-dasharray: 6 12;
      opacity: 0.3;
      animation: dash 20s linear infinite;
    }

    .connection-fast {
      stroke: #06b6d4;
      stroke-width: 1;
      stroke-dasharray: 4 8;
      opacity: 0.4;
      animation: dash 10s linear infinite;
    }

    @keyframes pulseNode {
      0% {
        transform: scale(0.8);
        opacity: 0.5;
      }
      100% {
        transform: scale(1.2);
        opacity: 1;
      }
    }

    @keyframes dash {
      to {
        stroke-dashoffset: -360;
      }
    }

    /* Typography styling */
    .title-text {
      font-family: 'system-ui', -apple-system, sans-serif;
      font-size: 56px;
      font-weight: 800;
      fill: url(#textGrad);
      letter-spacing: 4px;
      filter: url(#glow);
      animation: titleFloat 6s ease-in-out infinite alternate;
    }

    .subtitle-text {
      font-family: 'system-ui', -apple-system, sans-serif;
      font-size: 20px;
      font-weight: 600;
      fill: #9ca3af;
      letter-spacing: 6px;
    }

    .tag-container {
      fill: #1e1b4b;
      stroke: #a855f7;
      stroke-width: 1.5;
      rx: 8;
      filter: url(#glow);
    }

    .tag-text {
      font-family: 'system-ui', -apple-system, sans-serif;
      font-size: 14px;
      font-weight: 700;
      fill: #06b6d4;
      letter-spacing: 1px;
    }

    @keyframes titleFloat {
      0% {
        transform: translateY(0px);
      }
      100% {
        transform: translateY(-8px);
      }
    }

    /* Scanning laser effect */
    .laser {
      stroke: url(#textGrad);
      stroke-width: 1.5;
      opacity: 0.6;
      filter: url(#glow-heavy);
      animation: laserMove 6s ease-in-out infinite alternate;
    }

    @keyframes laserMove {
      0% {
        y1: 10px; y2: 10px;
        opacity: 0.1;
      }
      50% {
        opacity: 0.7;
      }
      100% {
        y1: 390px; y2: 390px;
        opacity: 0.1;
      }
    }
  </style>

  <!-- Background Rect -->
  <rect width="100%" height="100%" class="bg" />

  <!-- 3D Perspective Lines / Horizon Grid -->
  <g opacity="0.7">
    <!-- Perspective horizontal travel lines -->
    <path class="grid-lines" d="M0,200 L1200,200 M0,240 L1200,240 M0,280 L1200,280 M0,320 L1200,320 M0,360 L1200,360 M0,400 L1200,400" />
    
    <!-- Vanishing point radial grid lines -->
    <line x1="600" y1="150" x2="-200" y2="400" stroke="#3b0764" stroke-width="1.5" opacity="0.3" />
    <line x1="600" y1="150" x2="0" y2="400" stroke="#3b0764" stroke-width="1.5" opacity="0.3" />
    <line x1="600" y1="150" x2="200" y2="400" stroke="#3b0764" stroke-width="1.5" opacity="0.3" />
    <line x1="600" y1="150" x2="400" y2="400" stroke="#3b0764" stroke-width="1.5" opacity="0.3" />
    <line x1="600" y1="150" x2="800" y2="400" stroke="#3b0764" stroke-width="1.5" opacity="0.3" />
    <line x1="600" y1="150" x2="1000" y2="400" stroke="#3b0764" stroke-width="1.5" opacity="0.3" />
    <line x1="600" y1="150" x2="1200" y2="400" stroke="#3b0764" stroke-width="1.5" opacity="0.3" />
    <line x1="600" y1="150" x2="1400" y2="400" stroke="#3b0764" stroke-width="1.5" opacity="0.3" />
  </g>

  <!-- Scanning Laser Line -->
  <line x1="0" y1="50" x2="1200" y2="50" class="laser" />

  <!-- Neural Network Elements (Left Side) -->
  <g transform="translate(10, 0)">
    <line x1="100" y1="100" x2="200" y2="80" class="connection" />
    <line x1="200" y1="80" x2="280" y2="180" class="connection-fast" />
    <line x1="100" y1="100" x2="150" y2="220" class="connection" />
    <line x1="150" y1="220" x2="280" y2="180" class="connection" />
    <line x1="150" y1="220" x2="80" y2="280" class="connection" />
    <line x1="280" y1="180" x2="220" y2="300" class="connection" />
    <line x1="80" y1="280" x2="220" y2="300" class="connection-fast" />

    <circle cx="100" cy="100" r="6" class="node" />
    <circle cx="200" cy="80" r="8" class="node-violet" />
    <circle cx="280" cy="180" r="10" class="node" />
    <circle cx="150" cy="220" r="7" class="node-violet" />
    <circle cx="80" cy="280" r="5" class="node" />
    <circle cx="220" cy="300" r="9" class="node-violet" />
  </g>

  <!-- Neural Network Elements (Right Side) -->
  <g transform="translate(850, 0)">
    <line x1="100" y1="180" x2="220" y2="100" class="connection-fast" />
    <line x1="220" y1="100" x2="300" y2="200" class="connection" />
    <line x1="100" y1="180" x2="160" y2="280" class="connection" />
    <line x1="160" y1="280" x2="300" y2="200" class="connection-fast" />
    <line x1="160" y1="280" x2="80" y2="110" class="connection" />
    <line x1="80" y1="110" x2="220" y2="100" class="connection" />
    <line x1="160" y1="280" x2="240" y2="320" class="connection" />
    <line x1="300" y1="200" x2="240" y2="320" class="connection" />

    <circle cx="100" cy="180" r="8" class="node-violet" />
    <circle cx="220" cy="100" r="6" class="node" />
    <circle cx="300" cy="200" r="11" class="node-violet" />
    <circle cx="160" cy="280" r="7" class="node" />
    <circle cx="80" cy="110" r="5" class="node-violet" />
    <circle cx="240" cy="320" r="9" class="node" />
  </g>

  <!-- Central Brand Typography -->
  <g transform="translate(600, 175)" text-anchor="middle">
    <!-- Main Glowing Title -->
    <text y="0" class="title-text">HEMANTH BALAJI</text>
    
    <!-- Sleek Subtitle -->
    <text y="50" class="subtitle-text">AI ENGINEER IN-TRAINING</text>

    <!-- Interactive Badges within Banner -->
    <g transform="translate(-160, 90)">
      <rect width="100" height="30" class="tag-container" />
      <text x="50" y="20" text-anchor="middle" class="tag-text">PYTHON</text>
    </g>
    <g transform="translate(-50, 90)">
      <rect width="100" height="30" class="tag-container" stroke="#d946ef" />
      <text x="50" y="20" text-anchor="middle" class="tag-text" fill="#d946ef">PYTORCH</text>
    </g>
    <g transform="translate(60, 90)">
      <rect width="100" height="30" class="tag-container" stroke="#06b6d4" />
      <text x="50" y="20" text-anchor="middle" class="tag-text" fill="#06b6d4">LLMS</text>
    </g>
  </g>
</svg>
