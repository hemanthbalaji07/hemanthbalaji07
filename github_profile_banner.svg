<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400" viewBox="0 0 1200 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a051b"/>
      <stop offset="100%" stop-color="#05020c"/>
    </linearGradient>
    <linearGradient id="tg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d946ef"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .a1{animation:p1 3s ease-in-out infinite alternate}
      .a2{animation:p2 4s ease-in-out infinite alternate}
      .a3{animation:dash 18s linear infinite}
      .a4{animation:dash 10s linear infinite}
      .a5{animation:fl 6s ease-in-out infinite alternate}
      @keyframes p1{0%{opacity:.5}100%{opacity:1}}
      @keyframes p2{0%{opacity:.4}100%{opacity:.9}}
      @keyframes dash{to{stroke-dashoffset:-300}}
      @keyframes fl{0%{transform:translateY(0)}100%{transform:translateY(-6px)}}
    </style>
  </defs>

  <rect width="1200" height="400" fill="url(#bg)"/>

  <line x1="0" y1="200" x2="1200" y2="200" stroke="#3b0764" stroke-width="1" opacity=".15"/>
  <line x1="0" y1="240" x2="1200" y2="240" stroke="#3b0764" stroke-width="1" opacity=".15"/>
  <line x1="0" y1="280" x2="1200" y2="280" stroke="#3b0764" stroke-width="1" opacity=".15"/>
  <line x1="0" y1="320" x2="1200" y2="320" stroke="#3b0764" stroke-width="1" opacity=".15"/>
  <line x1="0" y1="360" x2="1200" y2="360" stroke="#3b0764" stroke-width="1" opacity=".15"/>

  <line x1="600" y1="150" x2="0" y2="400" stroke="#3b0764" stroke-width="1" opacity=".2"/>
  <line x1="600" y1="150" x2="200" y2="400" stroke="#3b0764" stroke-width="1" opacity=".2"/>
  <line x1="600" y1="150" x2="400" y2="400" stroke="#3b0764" stroke-width="1" opacity=".2"/>
  <line x1="600" y1="150" x2="800" y2="400" stroke="#3b0764" stroke-width="1" opacity=".2"/>
  <line x1="600" y1="150" x2="1000" y2="400" stroke="#3b0764" stroke-width="1" opacity=".2"/>
  <line x1="600" y1="150" x2="1200" y2="400" stroke="#3b0764" stroke-width="1" opacity=".2"/>

  <line x1="100" y1="100" x2="200" y2="80" stroke="#a855f7" stroke-width=".8" stroke-dasharray="6 12" opacity=".35" class="a3"/>
  <line x1="200" y1="80" x2="280" y2="180" stroke="#06b6d4" stroke-width="1" stroke-dasharray="4 8" opacity=".4" class="a4"/>
  <line x1="100" y1="100" x2="150" y2="220" stroke="#a855f7" stroke-width=".8" stroke-dasharray="6 12" opacity=".35" class="a3"/>
  <line x1="150" y1="220" x2="280" y2="180" stroke="#a855f7" stroke-width=".8" stroke-dasharray="6 12" opacity=".35" class="a3"/>
  <line x1="150" y1="220" x2="80" y2="290" stroke="#06b6d4" stroke-width="1" stroke-dasharray="4 8" opacity=".4" class="a4"/>
  <line x1="280" y1="180" x2="220" y2="310" stroke="#a855f7" stroke-width=".8" stroke-dasharray="6 12" opacity=".35" class="a3"/>
  <line x1="80" y1="290" x2="220" y2="310" stroke="#06b6d4" stroke-width="1" stroke-dasharray="4 8" opacity=".4" class="a4"/>

  <circle cx="100" cy="100" r="6" fill="#06b6d4" filter="url(#glow)" class="a1"/>
  <circle cx="200" cy="80" r="8" fill="#d946ef" filter="url(#glow)" class="a2"/>
  <circle cx="280" cy="180" r="10" fill="#06b6d4" filter="url(#glow)" class="a1"/>
  <circle cx="150" cy="220" r="7" fill="#d946ef" filter="url(#glow)" class="a2"/>
  <circle cx="80" cy="290" r="5" fill="#06b6d4" filter="url(#glow)" class="a1"/>
  <circle cx="220" cy="310" r="9" fill="#d946ef" filter="url(#glow)" class="a2"/>

  <line x1="950" y1="180" x2="1070" y2="100" stroke="#06b6d4" stroke-width="1" stroke-dasharray="4 8" opacity=".4" class="a4"/>
  <line x1="1070" y1="100" x2="1150" y2="200" stroke="#a855f7" stroke-width=".8" stroke-dasharray="6 12" opacity=".35" class="a3"/>
  <line x1="950" y1="180" x2="1010" y2="290" stroke="#a855f7" stroke-width=".8" stroke-dasharray="6 12" opacity=".35" class="a3"/>
  <line x1="1010" y1="290" x2="1150" y2="200" stroke="#06b6d4" stroke-width="1" stroke-dasharray="4 8" opacity=".4" class="a4"/>
  <line x1="930" y1="110" x2="1070" y2="100" stroke="#a855f7" stroke-width=".8" stroke-dasharray="6 12" opacity=".35" class="a3"/>
  <line x1="1010" y1="290" x2="1090" y2="330" stroke="#06b6d4" stroke-width="1" stroke-dasharray="4 8" opacity=".4" class="a4"/>
  <line x1="1150" y1="200" x2="1090" y2="330" stroke="#a855f7" stroke-width=".8" stroke-dasharray="6 12" opacity=".35" class="a3"/>

  <circle cx="950" cy="180" r="8" fill="#d946ef" filter="url(#glow)" class="a2"/>
  <circle cx="1070" cy="100" r="6" fill="#06b6d4" filter="url(#glow)" class="a1"/>
  <circle cx="1150" cy="200" r="11" fill="#d946ef" filter="url(#glow)" class="a2"/>
  <circle cx="1010" cy="290" r="7" fill="#06b6d4" filter="url(#glow)" class="a1"/>
  <circle cx="930" cy="110" r="5" fill="#d946ef" filter="url(#glow)" class="a2"/>
  <circle cx="1090" cy="330" r="9" fill="#06b6d4" filter="url(#glow)" class="a1"/>

  <g filter="url(#glow)" class="a5" text-anchor="middle">
    <text x="600" y="185" font-family="Arial Black, Arial, sans-serif" font-size="58" font-weight="900" letter-spacing="4" fill="url(#tg)">HEMANTH BALAJI</text>
    <text x="600" y="232" font-family="Arial, sans-serif" font-size="18" font-weight="600" letter-spacing="8" fill="#9ca3af">AI ENGINEER IN-TRAINING</text>
  </g>

  <rect x="440" y="258" width="100" height="30" rx="8" fill="#1e1b4b" stroke="#a855f7" stroke-width="1.5"/>
  <text x="490" y="278" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#06b6d4" text-anchor="middle" letter-spacing="1">PYTHON</text>

  <rect x="550" y="258" width="100" height="30" rx="8" fill="#1e1b4b" stroke="#d946ef" stroke-width="1.5"/>
  <text x="600" y="278" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#d946ef" text-anchor="middle" letter-spacing="1">PYTORCH</text>

  <rect x="660" y="258" width="100" height="30" rx="8" fill="#1e1b4b" stroke="#06b6d4" stroke-width="1.5"/>
  <text x="710" y="278" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#06b6d4" text-anchor="middle" letter-spacing="1">LLMs</text>
</svg>
