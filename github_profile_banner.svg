<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400" viewBox="0 0 1200 400">
  <defs>
    <!-- Glowing Console Borders -->
    <linearGradient id="consoleBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" stop-opacity="0.8" />
      <stop offset="50%" stop-color="#7000ff" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#ff007f" stop-opacity="0.8" />
    </linearGradient>

    <!-- Outer Border Gradient -->
    <linearGradient id="outerBorder" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="33%" stop-color="#7000ff" />
      <stop offset="66%" stop-color="#ff007f" />
      <stop offset="100%" stop-color="#00f2fe" />
    </linearGradient>

    <!-- Title Neon Gradient -->
    <linearGradient id="neonTitle" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#ff007f" />
    </linearGradient>

    <!-- Spaceship Trail Gradient -->
    <linearGradient id="trailGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f2fe" stop-opacity="0.8" />
      <stop offset="50%" stop-color="#7000ff" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#ff007f" stop-opacity="0" />
    </linearGradient>

    <!-- Neon Glow Filters -->
    <filter id="glowCyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glowPink" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <style>
      /* Console Scanlines Overlay */
      @keyframes scanline {
        0% { transform: translateY(0); }
        100% { transform: translateY(280px); }
      }
      .scanline-bar {
        animation: scanline 6s linear infinite;
        opacity: 0.08;
      }

      /* Radar Sweep Animation */
      @keyframes radarRotate {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      .radar-sweep {
        transform-origin: 1030px 270px;
        animation: radarRotate 4s linear infinite;
      }

      /* Pulse Spaceship Trail Particle */
      @keyframes trailFlow {
        0% { stroke-dashoffset: 250; }
        100% { stroke-dashoffset: -250; }
      }
      .pulse-trail {
        stroke-dasharray: 20 80;
        animation: trailFlow 3s linear infinite;
      }

      /* Text Glitch Effect */
      @keyframes glitchText {
        0%, 95%, 100% { transform: translate(0, 0); }
        96% { transform: translate(-2px, 1px); }
        97% { transform: translate(2px, -1px); }
        98% { transform: translate(-1px, -2px); }
        99% { transform: translate(2px, 2px); }
      }
      .glitch-effect {
        animation: glitchText 5s infinite;
        transform-origin: 95px 245px;
      }

      /* Running Neon Border Around Banner */
      @keyframes borderFlow {
        to { stroke-dashoffset: -1160; }
      }
      .neon-border {
        stroke-dasharray: 100 280;
        animation: borderFlow 10s linear infinite;
      }

      /* Flashing Indicator */
      @keyframes flash {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 1; }
      }
      .flashing {
        animation: flash 1.5s infinite;
      }

      /* Floating Coordinate Text */
      @keyframes floatText {
        0%, 100% { transform: translateY(0); opacity: 0.4; }
        50% { transform: translateY(-4px); opacity: 0.8; }
      }
      .coord-text {
        animation: floatText 3s ease-in-out infinite;
      }
      .coord-text-delayed {
        animation: floatText 3s ease-in-out infinite;
        animation-delay: 1.5s;
      }
    </style>
  </defs>

  <!-- BACKGROUND IMAGE (Cinematic Cyber-Metropolis Backdrop) -->
  <image href="https://raw.githubusercontent.com/hemanthbalaji07/hemanthbalaji07/main/cyber_banner_bg.png" x="0" y="0" width="1200" height="400" preserveAspectRatio="xMidYMid slice" />

  <!-- GRID OVERLAY (HUD Feel) -->
  <g stroke="#00f2fe" stroke-width="0.5" opacity="0.08">
    <line x1="0" y1="50" x2="1200" y2="50" />
    <line x1="0" y1="100" x2="1200" y2="100" />
    <line x1="0" y1="150" x2="1200" y2="150" />
    <line x1="0" y1="200" x2="1200" y2="200" />
    <line x1="0" y1="250" x2="1200" y2="250" />
    <line x1="0" y1="300" x2="1200" y2="300" />
    <line x1="0" y1="350" x2="1200" y2="350" />
    <line x1="150" y1="0" x2="150" y2="400" />
    <line x1="300" y1="0" x2="300" y2="400" />
    <line x1="450" y1="0" x2="450" y2="400" />
    <line x1="600" y1="0" x2="600" y2="400" />
    <line x1="750" y1="0" x2="750" y2="400" />
    <line x1="900" y1="0" x2="900" y2="400" />
    <line x1="1050" y1="0" x2="1050" y2="400" />
  </g>

  <!-- SPACESHIP ENGINE TRAIL (Overlay Animation) -->
  <!-- We place this along the sky region to represent high-tech travel -->
  <path d="M 580,105 Q 810,65 1090,135" fill="none" stroke="url(#trailGrad)" stroke-width="3" opacity="0.4" />
  <path d="M 580,105 Q 810,65 1090,135" fill="none" stroke="#00f2fe" stroke-width="3.5" class="pulse-trail" filter="url(#glowCyan)" />

  <!-- ==================== HOLOGRAPHIC CONSOLE WINDOW ==================== -->
  <g>
    <!-- Glassmorphic Window Backdrop -->
    <rect x="70" y="60" width="460" height="280" rx="12" fill="#04060d" fill-opacity="0.75" stroke="url(#consoleBorder)" stroke-width="1.5" />
    
    <!-- Window Header -->
    <path d="M 70,72 C 70,65 75,60 82,60 L 518,60 C 525,60 530,65 530,72 L 530,90 L 70,90 Z" fill="#020306" fill-opacity="0.9" />
    
    <!-- Window Controls (Red, Yellow, Green Dots) -->
    <circle cx="95" cy="75" r="5" fill="#ff5f56" />
    <circle cx="110" cy="75" r="5" fill="#ffbd2e" />
    <circle cx="125" cy="75" r="5" fill="#27c93f" />
    
    <!-- Header Labels -->
    <text x="145" y="80" fill="#8892b0" font-family="monospace" font-size="11" letter-spacing="1">SYSTEM_TERMINAL // HEMANTH_BALAJI</text>
    <text x="510" y="80" fill="#00f2fe" font-family="monospace" font-size="10" text-anchor="end" class="flashing" font-weight="bold">ONLINE</text>

    <!-- Scanline Moving Beam (Inside ClipPath) -->
    <g>
      <clipPath id="consoleClip">
        <rect x="71" y="91" width="458" height="248" rx="0" />
      </clipPath>
      <g clip-path="url(#consoleClip)">
        <rect class="scanline-bar" x="71" width="458" height="3" fill="#00f2fe" />
      </g>
    </g>

    <!-- Console Text Content -->
    <!-- > SYSTEM INITIATED -->
    <text x="95" y="125" fill="#ff007f" font-family="monospace" font-size="11" font-weight="bold" letter-spacing="2">&gt; SYSTEM INITIATED</text>

    <!-- Name: HEMANTH BALAJI -->
    <text x="95" y="172" fill="url(#neonTitle)" font-family="sans-serif" font-size="38" font-weight="900" filter="url(#glowCyan)" letter-spacing="1">HEMANTH BALAJI</text>

    <!-- Subtitle: Future AI Engineer // I Year CS Student -->
    <text x="95" y="208" fill="#e2a700" font-family="monospace" font-size="13" font-weight="bold" letter-spacing="2">Future AI Engineer // I Year CS Student</text>

    <!-- Decrypt / Glitch Tag: @sp1r1ng A1 Arch1t3ct -->
    <text x="95" y="242" fill="#00f2fe" font-family="monospace" font-size="12" font-weight="bold" class="glitch-effect" letter-spacing="1.5">@sp1r1ng A1 Arch1t3ct</text>

    <!-- Divider Line -->
    <line x1="95" y1="262" x2="505" y2="262" stroke="#ff007f" stroke-width="1" opacity="0.3" />

    <!-- Terminal Footer Status Grid -->
    <g font-family="monospace" font-size="9" fill="#8892b0" font-weight="bold" letter-spacing="1">
      <text x="95" y="285">PORT: <tspan fill="#ffffff">8080</tspan></text>
      <text x="200" y="285">LINK: <tspan fill="#00f2fe">SECURE</tspan></text>
      <text x="320" y="285">SYS_LOG: <tspan fill="#ff007f">OPERATIONAL</tspan></text>
      
      <!-- Flashing prompt cursor -->
      <text x="95" y="312" fill="#00f2fe" font-size="11">&gt; loading neural network components...<tspan class="flashing" fill="#00f2fe">_</tspan></text>
    </g>
  </g>

  <!-- ==================== HUD CORNER RADAR SYSTEM ==================== -->
  <g transform="translate(0, 0)">
    <!-- Outer Coordinates Grid -->
    <g font-family="monospace" font-size="9" fill="#00f2fe" opacity="0.5" letter-spacing="1">
      <text x="1110" y="365" text-anchor="end" class="coord-text">COORD: [489.12 // 712.94]</text>
      <text x="1110" y="155" text-anchor="end" class="coord-text-delayed">LOG_SYNC: ACTIVE</text>
    </g>

    <!-- Radar Concentric Rings -->
    <circle cx="1030" cy="260" r="75" fill="none" stroke="#00f2fe" stroke-width="1.2" stroke-dasharray="8 16" opacity="0.2" />
    <circle cx="1030" cy="260" r="50" fill="none" stroke="#ff007f" stroke-width="1" stroke-dasharray="6 6" opacity="0.25" />
    <circle cx="1030" cy="260" r="25" fill="none" stroke="#00f2fe" stroke-width="0.8" opacity="0.15" />
    
    <!-- Target Crosshairs -->
    <line x1="945" y1="260" x2="1115" y2="260" stroke="#00f2fe" stroke-width="0.8" opacity="0.15" />
    <line x1="1030" y1="175" x2="1030" y2="345" stroke="#00f2fe" stroke-width="0.8" opacity="0.15" />

    <!-- Radar Rotating Sweep -->
    <line x1="1030" y1="260" x2="1083" y2="207" stroke="#00f2fe" stroke-width="2" class="radar-sweep" filter="url(#glowCyan)" opacity="0.8" />
    <polygon points="1030,260 1083,207 1095,225" fill="#00f2fe" fill-opacity="0.08" class="radar-sweep" />

    <!-- Mini Radar Blips -->
    <circle cx="1000" cy="230" r="3" fill="#ff007f" filter="url(#glowPink)" class="flashing" />
    <circle cx="1060" cy="290" r="3.5" fill="#00f2fe" filter="url(#glowCyan)" class="flashing" style="animation-delay: 0.7s;" />
  </g>

  <!-- ==================== RUNNING OUTLINE NEON BORDER ==================== -->
  <rect x="15" y="15" width="1170" height="370" rx="12" fill="none" stroke="#05070c" stroke-width="1" />
  <rect x="15" y="15" width="1170" height="370" rx="12" fill="none" stroke="url(#outerBorder)" stroke-width="2.5" class="neon-border" filter="url(#glowCyan)" />
</svg>
